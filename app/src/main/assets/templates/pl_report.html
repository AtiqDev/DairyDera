<!-- File: templates/pl_report.html -->

<!-- Top Bar -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button
            type="button"
            class="btn btn-outline-secondary btn-sm btn-icon me-2"
            onclick="navigate('reports')"
            aria-label="Back"
            style="width: 32px; height: 32px; padding: 0;"
    >
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <div class="ConsoleLog"></div>
    <h5 class="screen-title mb-0 flex-grow-1">Profit &amp; Loss</h5>
</div>

<!-- Indigo Toolbar for Date Range -->
<div class="bg-indigo text-white px-3 py-2">
    <div class="row g-2 align-items-center">
        <div class="col-auto">
            <label for="pl-from" class="form-label mb-0">From:</label>
        </div>
        <div class="col-auto">
            <input type="date" id="pl-from" class="form-control form-control-sm" />
        </div>
        <div class="col-auto">
            <label for="pl-to" class="form-label mb-0">To:</label>
        </div>
        <div class="col-auto">
            <input type="date" id="pl-to" class="form-control form-control-sm" />
        </div>
        <div class="col-auto">
            <button class="btn btn-light btn-sm" onclick="loadProfitLoss()">Load</button>
        </div>
    </div>
</div>

<!-- Summary Section -->
<main class="screen-body">
    <div class="row mb-3">
        <div class="col">
            <div id="plStats" class="fw-semibold text-dark"></div>
        </div>
    </div>

    <!-- P&L Table -->
    <div class="row">
        <div class="col">
            <div class="table-responsive">
                <table id="pl-table" class="table table-sm table-bordered table-striped bg-white mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>code</th>
                        <th>name</th>
                        <th>Type</th>
                        <th class="text-end">Net</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<style>
    .bg-indigo { background-color: #4b0082; }
</style>

<script>
    ;(function () {
        function init_pl_report() {
          const today = new Date().toISOString().slice(0, 10);
          window.console.log(today);
          window.document.getElementById('pl-from').value = today;
          window.document.getElementById('pl-to').value   = today;
          loadProfitLoss();
        }

        async function loadProfitLoss() {
          const from = window.document.getElementById('pl-from').value;
          const to   = window.document.getElementById('pl-to').value;
          const raw_data = await nativeApi.call('getProfitAndLoss', {from, to});
          const data = JSON.parse(raw_data);
          const tbody = window.document.getElementById('pl-table').querySelector('tbody');
          const stats = window.document.getElementById('plStats');

          if (!data.length) {
            stats.textContent = 'No data found.';
            tbody.innerHTML   = '';
            return;
          }

          // sum revenues and expenses separately for summary
          let revenueTotal = 0, expenseTotal = 0;
          data.forEach(r => {
            if (r.Type === 'Revenue') revenueTotal += r.Net;
            if (r.Type === 'Expense') expenseTotal += r.Net;
          });

          const profit = revenueTotal + expenseTotal;
          stats.textContent = `Revenue: ${revenueTotal.toFixed(2)} | Expenses: ${(-expenseTotal).toFixed(2)} | Net Profit: ${profit.toFixed(2)}`;

          tbody.innerHTML = data.map(r => `
            <tr>
              <td>${r.code}</td>
              <td>${r.name}</td>
              <td>${r.Type}</td>
              <td class="text-end">${r.Net.toFixed(2)}</td>
            </tr>
          `).join('');
        }

        window.document.addEventListener('DOMContentLoaded', init_pl_report);

        window.init_pl_report = init_pl_report;
    })();
</script>

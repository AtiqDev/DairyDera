<!-- File: android_asset/templates/supplier_form.html -->

<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button id="backPurchaseForm" class="btn btn-outline-secondary btn-icon me-3" onclick="navigate()" style="width: 32px; height: 32px; padding: 0;">
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <div class="screen-title" id="supFormTitle"></div>
    <button id="cancelPurchaseForm" class="btn btn-outline-secondary btn-icon" style="width: 32px; height: 32px; padding: 0;" onclick="navigate()">
        <i class="fas fa-times"></i>
    </button>
</div>

<main class="screen-body">

    <!-- Supplier core fields -->
    <label>name     <input id="name" /></label>
    <label>address  <input id="address" /></label>
    <label>phone    <input id="phone" /></label>
    <label>rate     <input id="rate" type="number" /></label>
    <label>quantity <input id="qty"  type="number" step="0.1" /></label>

    <hr style="margin:1rem 0"/>

    <!-- Supplier-Items table -->
    <div>
        <h3>Offered Items</h3>
        <table id="itemsTable" style="width:100%; border-collapse:collapse;">
            <thead>
            <tr>
                <th style="width:15%;">SKU</th>
                <th style="width:35%;">Item name</th>
                <th style="width:15%;">price / UOM</th>
                <th style="width:20%;">UOM</th>
                <th style="width:15%;"> </th>
            </tr>
            </thead>
            <tbody>
            <!-- rows injected here -->
            </tbody>
        </table>
        <button id="addItemRow" style="margin-top:.5rem;">＋ Add Item</button>
    </div>

    <div style="margin-top:1.5rem;">
        <button id="saveSupForm" style="margin-right:1rem;">Save Supplier</button>
    </div>
</main>

<script>
    (function () {

      async function init_supplier_form(params) {

        // load UOM list once
        const uoms_raw = await nativeApi.call('getUOMList');
        const uoms = JSON.parse(uoms_raw);
        function renderUomOptions(sel, selectedId) {
          sel.innerHTML = uoms.map(u =>
            `<option value="${u.id}" ${u.id == selectedId ? 'selected' : ''}>${u.name}</option>`
          ).join('');
        }

        // load or init supplier
        const list_raw = await nativeApi.call('getSuppliers');
        const list = JSON.parse(list_raw);
        const sup  = params.id
          ? list.find(x => x.id == params.id)
          : {};

        document.getElementById('supFormTitle').textContent = params.id ? 'Edit Supplier' : 'New Supplier';

        // prefill core fields
        document.getElementById('name').value    = sup.name     || '';
        document.getElementById('address').value = sup.address  || '';
        document.getElementById('phone').value   = sup.phone    || '';
        document.getElementById('rate').value    = sup.rate     || 0;
        document.getElementById('qty').value     = sup.quantity || 0;

        // items table
        const tbody = document.querySelector('#itemsTable tbody');

        // helper: build one row, optionally from an existing item object
        function addRow(item) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input class="item-sku"   type="text" /></td>
            <td><input class="item-name"  type="text" /></td>
            <td><input class="item-price" type="number" step="0.01" /></td>
            <td><select class="item-uom"></select></td>
            <td style="text-align:center;">
              <button class="remove-row">–</button>
            </td>`;

          // populate with existing values
          if (item) {
            tr.querySelector('.item-sku').value   = item.SKU;
            tr.querySelector('.item-name').value  = item.ItemName;
            tr.querySelector('.item-price').value = item.PricePerUOM;
            renderUomOptions(tr.querySelector('.item-uom'), item.uomId);
          } else {
            renderUomOptions(tr.querySelector('.item-uom'), null);
          }

          // remove handler
          tr.querySelector('.remove-row').onclick = () => {
            tbody.removeChild(tr);
          };

          tbody.appendChild(tr);
          return tr;
        }

        // Add-row button
        document.getElementById('addItemRow').onclick = () => addRow();

        // load existing items (if editing)
        if (params.id) {
          const existing_raw = await nativeApi.call('getSupplierItems', {supplierId: params.id});
          const existing = JSON.parse(existing_raw);
          existing.forEach(item => addRow(item));
        }

        // Save handler: collect core + items, then RPC
        document.getElementById('saveSupForm').onclick = async () => {
          // core
          const supObj = {
            id:         sup.id || 0,
            name:       document.getElementById('name').value.trim(),
            address:    document.getElementById('address').value.trim(),
            phone:      document.getElementById('phone').value.trim(),
            rate:       parseFloat(document.getElementById('rate').value),
            quantity:   parseFloat(document.getElementById('qty').value),
            createDate: sup.createDate || new Date().toISOString(),
            updateDate: new Date().toISOString()
          };
          const saved_raw = await nativeApi.call('saveSupplier', supObj);
          const saved = JSON.parse(saved_raw);
          const newSupId = saved.id;

          // items
          const items = Array.from(tbody.children).map(tr => ({
            SKU:         tr.querySelector('.item-sku').value.trim(),
            ItemName:    tr.querySelector('.item-name').value.trim(),
            PricePerUOM: parseFloat(tr.querySelector('.item-price').value),
            uomId:       parseInt(tr.querySelector('.item-uom').value, 10)
          }));

          nativeApi.post('saveSupplierItems', { supplierId: newSupId, Items: items });

          navigate();
        };
      }

      // expose globally
      window.init_supplier_form = init_supplier_form;

    })();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Journal Report</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --brand:        #4b0082;
          --brand-dark:   #38006b;
          --brand-light:  rgba(75,0,130,.08);
          --bg:           #f2f4f8;
          --surface:      #ffffff;
          --surface2:     #f7f8fa;
          --border:       #e2e6ed;
          --green:        #16a34a;
          --green-dim:    rgba(22,163,74,.10);
          --red:          #dc2626;
          --red-dim:      rgba(220,38,38,.10);
          --amber:        #d97706;
          --amber-dim:    rgba(217,119,6,.10);
          --blue:         #2563eb;
          --blue-dim:     rgba(37,99,235,.08);
          --purple:       #7c3aed;
          --purple-dim:   rgba(124,58,237,.08);
          --teal:         #0d9488;
          --teal-dim:     rgba(13,148,136,.08);
          --text-1:       #0f172a;
          --text-2:       #64748b;
          --text-3:       #94a3b8;
          --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          --mono:         'Courier New', Courier, monospace;
          --radius:       10px;
          --radius-sm:    6px;
          --topbar-h:     52px;
          --toolbar-h:    56px;
        }

        html, body {
          height: 100%;
          background: var(--bg);
          color: var(--text-1);
          font-family: var(--font);
          font-size: 14px;
          -webkit-tap-highlight-color: transparent;
          overscroll-behavior: none;
        }

        /* ── TOPBAR ──────────────────────────────────────── */
        .screen-topbar {
          position: sticky; top: 0; z-index: 200;
          display: flex; align-items: center; gap: 10px;
          height: var(--topbar-h);
          padding: 0 4px;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          box-shadow: 0 1px 4px rgba(0,0,0,.07);
        }
        .screen-title {
          flex: 1;
          font-size: 15px; font-weight: 600; color: var(--text-1);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn-icon {
          flex-shrink: 0;
          width: 34px; height: 34px;
          border-radius: var(--radius-sm);
          border: 1px solid var(--border);
          background: transparent; color: var(--text-2);
          cursor: pointer;
          display: inline-flex; align-items: center; justify-content: center;
          font-size: 16px;
        }
        .btn-icon:active { background: var(--brand-light); color: var(--brand); }
        .topbar-badge {
          flex-shrink: 0;
          font-size: 11px; font-family: var(--mono);
          padding: 3px 3px; border-radius: 20px;
          background: var(--brand-light); color: var(--brand);
          border: 1px solid rgba(75,0,130,.18);
          white-space: nowrap;
        }

        /* ── FILTER TOOLBAR ──────────────────────────────── */
        .report-toolbar {
          position: sticky; top: var(--topbar-h); z-index: 100;
          background: var(--brand);
          border-bottom: 1px solid var(--brand-dark);
          overflow: hidden;
        }

        /* Collapsed summary row — always visible */
        .toolbar-summary {
          display: flex; align-items: center; gap: 10px;
          padding: 2px 4px; cursor: pointer;
          user-select: none; -webkit-user-select: none;
        }
        .toolbar-summary:active { background: rgba(0,0,0,.1); }
        .toolbar-cal-icon {
          width: 28px; height: 28px; flex-shrink: 0;
          border-radius: var(--radius-sm);
          background: rgba(255,255,255,.15);
          border: 1px solid rgba(255,255,255,.2);
          display: flex; align-items: center; justify-content: center;
          color: #fff; font-size: 13px;
        }
        .toolbar-date-summary {
          flex: 1;
          font-size: 13px; font-weight: 600; color: #fff;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .toolbar-date-summary span {
          font-size: 11px; font-weight: 400;
          color: rgba(255,255,255,.6); margin-right: 4px;
        }
        .toolbar-chevron {
          flex-shrink: 0;
          width: 32px; height: 32px;
          border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.28);
          background: rgba(255,255,255,.15);
          color: #fff;
          display: inline-flex; align-items: center; justify-content: center;
          cursor: pointer;
          transition: background .15s, transform .25s ease;
        }
        .toolbar-chevron:active { background: rgba(255,255,255,.35); }
        .toolbar-chevron.open { transform: rotate(180deg); }

        /* Separator between summary and expandable panel */
        .toolbar-panel-separator {
          height: 0;
          border-top: 1px solid rgba(255,255,255,.15);
          margin: 0 14px;
          transition: opacity .25s;
          opacity: 0;
        }
        .toolbar-panel.open ~ .toolbar-panel-separator,
        .toolbar-panel-separator.visible { opacity: 1; }

        /* Expandable panel */
        .toolbar-panel {
          max-height: 0;
          overflow: hidden;
          transition: max-height .28s ease, padding .28s ease;
          padding: 0 14px;
        }
        .toolbar-panel.open {
          max-height: 120px;
          padding: 0 4px 2px;
        }
        .toolbar-fields {
          display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
          padding-top: 2px;
        }
        .toolbar-fields label {
          font-size: 10px; font-weight: 600; letter-spacing: .04em;
          color: rgba(255,255,255,.6); white-space: nowrap; text-transform: uppercase;
        }
        .toolbar-fields input[type="date"] {
          flex: 1; min-width: 0;
          height: 28px; padding: 0 2px;
          border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.22);
          background: rgba(255,255,255,.12);
          color: #fff; font-size: 12px; font-family: var(--font);
          outline: none; -webkit-appearance: none; color-scheme: dark;
        }
        .toolbar-fields input[type="date"]:focus {
          border-color: rgba(255,255,255,.55);
          background: rgba(255,255,255,.20);
        }
        .toolbar-sep { color: rgba(255,255,255,.35); font-size: 11px; flex-shrink: 0; }

        /* Reload icon button — lives in the collapsed summary row */
        .btn-reload {
          flex-shrink: 0;
          width: 32px; height: 32px;
          border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.28);
          background: rgba(255,255,255,.15);
          color: #fff; font-size: 15px;
          cursor: pointer;
          display: inline-flex; align-items: center; justify-content: center;
          transition: background .15s;
        }
        .btn-reload:active { background: rgba(255,255,255,.35); }
        /* spinning state while loading */
        .btn-reload.spinning svg { animation: spin .7s linear infinite; }

        /* ── SCREEN BODY ─────────────────────────────────── */
        .screen-body { padding: 4px 2px 10px; }

        /* ── STAT STRIP ──────────────────────────────────── */
        .stat-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .stat-chip {
          display: flex; flex-direction: column;
          background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--radius-sm); padding: 4px 12px;
          flex: 1; min-width: 80px;
        }
        .stat-chip__label {
          font-size: 9px; font-weight: 700; letter-spacing: .07em;
          text-transform: uppercase; color: var(--text-2); margin-bottom: 2px;
        }
        .stat-chip__value {
          font-size: 13px; font-weight: 700;
          font-family: var(--mono); color: var(--text-1);
        }
        .stat-chip__value.brand { color: var(--brand); }
        .stat-chip__value.green { color: var(--green); }

        /* ── TABLE CARD ──────────────────────────────────── */
        .table-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          overflow: hidden;
        }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        thead { position: sticky; top: 0; z-index: 10; }
        thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
        th {
          padding: 10px 12px;
          font-size: 10px; font-weight: 700; letter-spacing: .08em;
          text-transform: uppercase; color: var(--text-2);
          white-space: nowrap; background: var(--surface2); text-align: left;
        }
        th.right { text-align: right; }

        tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:active { background: var(--brand-light); }
        td { padding: 9px 12px; vertical-align: middle; color: var(--text-1); }

        /* ── GROUP HEADER ────────────────────────────────── */
        tr.group-header td {
          padding: 8px 12px;
          font-size: 11px; font-weight: 700;
          border-top: 2px solid rgba(0,0,0,.07);
          border-bottom: 1px solid rgba(0,0,0,.06);
        }
        tr.group-header:first-child td { border-top: none; }

        .group-inner { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .group-label { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
        .cr-tag {
          font-size: 9px; font-weight: 800; letter-spacing: .06em;
          padding: 1px 5px; border-radius: 3px; text-transform: uppercase; flex-shrink: 0;
          background: var(--green-dim); color: var(--green);
          border: 1px solid rgba(22,163,74,.2);
        }
        .group-acc-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .group-acc-type { font-size: 10px; color: var(--text-3); flex-shrink: 0; }
        .group-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .group-count {
          font-size: 10px; font-family: var(--mono);
          padding: 2px 7px; border-radius: 10px;
          background: var(--surface); color: var(--text-3);
          border: 1px solid var(--border);
        }
        .group-total { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--green); }

        /* ── CELL HELPERS ────────────────────────────────── */
        .c-mono   { font-family: var(--mono); font-size: 12px; }
        .c-muted  { color: var(--text-2); }
        .c-bold   { font-weight: 600; }
        .c-right  { text-align: right; }
        .c-nowrap { white-space: nowrap; }
        .c-green  { color: var(--green); font-weight: 600; }

        .id-chip {
          display: inline-block; font-family: var(--mono); font-size: 11px;
          background: var(--surface2); color: var(--text-3);
          border: 1px solid var(--border); padding: 1px 7px; border-radius: 4px;
        }

        .ref-badge {
          display: inline-flex; align-items: center; gap: 4px;
          font-size: 10px; font-weight: 700;
          padding: 2px 7px; border-radius: 4px; white-space: nowrap;
        }

        .account-pair { display: flex; flex-direction: column; gap: 3px; }
        .account-row  { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .dir-tag {
          font-size: 9px; font-weight: 800; letter-spacing: .05em;
          padding: 1px 5px; border-radius: 3px; text-transform: uppercase; flex-shrink: 0;
        }
        .dir-tag.dr { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(220,38,38,.2); }
        .dir-tag.cr { background: var(--green-dim); color: var(--green); border: 1px solid rgba(22,163,74,.2); }
        .acc-name { color: var(--text-1); font-weight: 500; }
        .acc-type { color: var(--text-3); font-size: 11px; }

        .desc-cell {
          max-width: 170px; white-space: nowrap;
          overflow: hidden; text-overflow: ellipsis;
          color: var(--text-2); font-size: 12px;
        }

        /* ── TOTAL FOOTER ────────────────────────────────── */
        tfoot tr { background: var(--surface2); border-top: 2px solid var(--border); }
        tfoot td { padding: 10px 12px; font-weight: 700; font-size: 13px; }

        /* ── STATES ──────────────────────────────────────── */
        .state-box {
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          padding: 56px 20px; text-align: center; gap: 10px;
        }
        .state-box svg { opacity: .25; width: 40px; height: 40px; }
        .state-box p { font-size: 13px; color: var(--text-3); }
        .state-box p.err { color: var(--red); opacity: .85; }

        .spinner {
          width: 28px; height: 28px;
          border: 2.5px solid var(--border); border-top-color: var(--brand);
          border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes rowIn {
          from { opacity: 0; transform: translateY(4px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        tbody tr { animation: rowIn .18s ease both; }
    </style>
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────── -->
<div class="screen-topbar">
    <button class="btn-icon" id="backBtn" aria-label="Back">
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="screen-title">Journal Entries</h5>
    <span class="topbar-badge" id="badge-count">—</span>
</div>

<!-- ── FILTER TOOLBAR ─────────────────────────────────── -->
<div class="report-toolbar" id="report-toolbar">

    <!-- Collapsed summary (tap to expand / reload) -->
    <div class="toolbar-summary" id="toolbar-summary">
        <div class="toolbar-cal-icon">&#128197;</div>
        <div class="toolbar-date-summary" id="toolbar-date-summary">
            <span>From</span><span id="summary-from">—</span>
            &nbsp;&#8594;&nbsp;
            <span>To</span><span id="summary-to">—</span>
        </div>
        <button class="btn-reload" id="loadBtn" aria-label="Reload" title="Reload">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
        </button>
        <div class="toolbar-chevron" id="toolbar-chevron">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </div>
    </div>

    <!-- Separator — only visible when panel is open -->
    <div class="toolbar-panel-separator" id="toolbar-separator"></div>

    <!-- Expandable panel — date inputs only -->
    <div class="toolbar-panel" id="toolbar-panel">
        <div class="toolbar-fields">
            <label for="je-from">From</label>
            <input type="date" id="je-from" />
            <span class="toolbar-sep">&#8594;</span>
            <label for="je-to">To</label>
            <input type="date" id="je-to" />
        </div>
    </div>
</div>

<!-- ── SCREEN BODY ────────────────────────────────────── -->
<main class="screen-body">
    <div class="stat-strip" id="stat-strip"></div>
    <div class="table-card" id="reportContainer">
        <div class="state-box">
            <div class="spinner"></div>
            <p>Loading…</p>
        </div>
    </div>
</main>

</body>
</html>

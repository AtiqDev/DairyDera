<!-- Customers.html -->

<!-- Top Bar -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2" style="top: 51px; height:36px;">
    <h5 class="screen-title mb-0 flex-grow-1">Customers</h5>

    <!-- Export Invoices Button -->
    <button
            type="button"
            id="btnExportInvoices"
            class="btn btn-outline-success btn-sm ms-2"
            style="width: 32px;height: 28px; line-height: 1; font-size: 0.8rem;"
            title="Export All Invoices"
    >
        <i class="fas fa-file-archive me-1"></i> Export
    </button>
</div>

<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2 justify-content-between" style="top: 87px; height:50px;">
    <!-- Left: Back Button -->
    <div class="d-flex align-items-center">
        <button
                type="button" id="backCustList"
                class="btn btn-outline-secondary btn-sm btn-icon me-2"
                aria-label="Back"
                style="width: 32px; height: 32px; padding: 0;"
        >
            <i class="fas fa-arrow-circle-left"></i>
        </button>
    </div>

    <!-- Center: Mode Toggle (Sale / Edit / Payment) + WalkIn -->
    <div class="d-flex align-items-center justify-content-center flex-grow-1">
        <div class="btn-group btn-group-sm me-3" role="group" aria-label="Mode">
            <input type="radio" class="btn-check" name="mode" id="modeSale" value="Sale" autocomplete="off">
            <label class="btn btn-outline-primary" for="modeSale">Sale</label>

            <input type="radio" class="btn-check" name="mode" id="modeEdit" value="Edit" autocomplete="off">
            <label class="btn btn-outline-primary" for="modeEdit">Edit</label>

            <!-- NEW: Payment Mode -->
            <input type="radio" class="btn-check" name="mode" id="modePayment" value="Payment" autocomplete="off">
            <label class="btn btn-outline-success" for="modePayment">Payment</label>
        </div>

        <div class="d-flex align-items-center ms-2">
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="toggleWalkin" style="margin-top: 12px; !important">
            </div>
            <label class="form-check-label ms-2 mb-0" for="toggleWalkin">WalkIn</label>
        </div>
    </div>

    <!-- Right: New Customer Icon -->
    <div>
        <button
                type="button"
                id="btnNewCust"
                class="btn btn-primary btn-icon"
                style="width: 48px; height: 32px; padding: 0; margin-top: 8px;"
        >
            <i class="fas fa-user-plus"></i>
        </button>
    </div>
</div>

<!-- Available Milk Display -->
<div class="container-fluid py-2 bg-white border-bottom">
    <div class="d-flex align-items-center">
        <i class="fas fa-glass-whiskey fa-lg me-2" title="Available Milk"></i>
        <h6 class="mb-0">
            Available Milk:
            <span id="availMilk" class="text-primary">--</span> (Ltr)
            &nbsp;&nbsp;Sold:
            <span id="soldMilk" class="text-success">--</span> (Ltr)
        </h6>
    </div>
</div>

<!-- Search Bar -->
<div class="container-fluid py-2 border-bottom bg-white">
    <div class="input-group input-group-sm align-items-center">
        <span class="input-group-text p-0 d-flex justify-content-center align-items-center" style="width: 32px; height: 31px;">
            <i class="fas fa-search"></i>
        </span>
        <input type="text" id="custSearch" class="form-control" placeholder="Search ID, name, phone, Qty, rate" autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
</div>

<!-- Customer List Container -->
<main class="screen-body"
      id="custContainer"
      style="max-height: calc(100vh - 140px);"
>
    <div id="custList" class="list-group list-group-flush"></div>
</main>

<!-- customer_invoice.html -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button
            type="button"
            class="btn btn-outline-secondary btn-sm btn-icon me-2"
            onclick="navigate()"
            aria-label="Back"
            style="width: 32px; height: 32px; padding: 0;"
    >
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <div class="ConsoleLog"></div>
    <h5 class="screen-title mb-0 flex-grow-1">Customer Invoice</h5>
</div>

<!-- ✅ NEW: Customer + Month selectors -->
<div class="bg-white border-bottom p-2 d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div class="d-flex align-items-center">
        <label for="customerSelect" class="form-label mb-0 me-2 fw-semibold">Customer:</label>
        <select id="customerSelect" class="form-select form-select-sm" style="max-width: 220px;"></select>
    </div>
    <div class="d-flex align-items-center">
        <label for="monthSelect" class="form-label mb-0 me-2 fw-semibold">Month:</label>
        <select id="monthSelect" class="form-select form-select-sm" style="max-width: 160px;"></select>
    </div>
</div>

<main class="screen-body invoice-screen">
    <div id="invoice-content" class="invoice-container">
        <h5 id="report-title" class="text-center fw-bold mb-3">Loading Invoice...</h5>
        <div id="invoice-details" class="mb-3"></div>

        <div class="table-scroll-wrapper">
            <table id="invoice-table" class="table table-sm table-bordered table-striped invoice-table">
                <thead id="invoice-thead" class="table-light"></thead>
                <tbody id="invoice-tbody"></tbody>
            </table>
        </div>

        <div id="payment-details" class="signature-section"></div>
    </div>
</main>

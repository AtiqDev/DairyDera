<!-- Top Bar -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button
            type="button"
            class="btn btn-outline-secondary btn-sm btn-icon me-2"
            onclick="navigate()"
            aria-label="Back"
            style="width: 32px; height: 32px; padding: 0;"
    >
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="screen-title mb-0 flex-grow-1">Walk-in Sale</h5>
</div>

<!-- Main Content -->
<main class="screen-body">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <form id="walkin-form" class="mb-0">
                <!-- Row 1: Customer name -->
                <Div class="mb-3">
                    <label for="name" class="form-label">Customer name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter customer name" required />
                </Div>

                <!-- Row 2: quantity and rate side-by-side -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="qty" class="form-label">quantity</label>
                        <input type="number" step="0.1" id="qty" class="form-control" value="1.0" />
                    </div>
                    <div class="col-md-6">
                        <label for="rate" class="form-label">rate</label>
                        <input type="number" id="rate" class="form-control" value="240" />
                    </div>
                </div>

                    <!-- Save Button -->
                    <div class="col-12 d-flex justify-content-end">
                        <button type="button" id="saveWalkin" class="btn btn-success">
                            <i class="fas fa-save me-1"></i> Save
                        </button>
                    </div>
            </form>
        </div>
    </div>
</main>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cash Flow Analysis</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          /* Subject matter: Emerald for Finance/Cash Flow */
          --brand:        #10b981;
          --brand-dark:   #059669;
          --brand-light:  rgba(16,185,129,.08);
          --bg:            #f2f4f8;
          --surface:       #ffffff;
          --surface2:      #f7f8fa;
          --border:        #e2e6ed;
          --green:         #10b981;
          --red:           #ef4444;
          --text-1:        #0f172a;
          --text-2:        #64748b;
          --text-3:        #94a3b8;
          --font:          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          --mono:          'Courier New', Courier, monospace;
          --radius:        10px;
          --radius-sm:     6px;
          --topbar-h:      52px;
        }

        html, body {
          height: 100%; background: var(--bg); color: var(--text-1);
          font-family: var(--font); font-size: 14px;
          -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
        }

        /* ── TOPBAR ──────────────────────────────────────── */
        .screen-topbar {
          position: sticky; top: 0; z-index: 200;
          display: flex; align-items: center; gap: 10px;
          height: var(--topbar-h); padding: 0 4px;
          background: var(--surface); border-bottom: 1px solid var(--border);
          box-shadow: 0 1px 4px rgba(0,0,0,.07);
        }
        .screen-title {
          flex: 1; font-size: 15px; font-weight: 600; color: var(--text-1);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn-icon {
          flex-shrink: 0; width: 34px; height: 34px;
          border-radius: var(--radius-sm); border: 1px solid var(--border);
          background: transparent; color: var(--text-2); cursor: pointer;
          display: inline-flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .topbar-badge {
          flex-shrink: 0; font-size: 11px; font-family: var(--mono);
          padding: 3px 8px; border-radius: 20px;
          background: var(--brand-light); color: var(--brand);
          border: 1px solid rgba(16,185,129,.18); white-space: nowrap;
        }

        /* ── FILTER TOOLBAR ──────────────────────────────── */
        .report-toolbar {
          position: sticky; top: var(--topbar-h); z-index: 100;
          background: var(--brand); border-bottom: 1px solid var(--brand-dark);
          overflow: hidden;
        }
        .toolbar-summary { display: flex; align-items: center; gap: 10px; padding: 2px 4px; cursor: pointer; }
        .toolbar-cal-icon {
          width: 28px; height: 28px; flex-shrink: 0; border-radius: var(--radius-sm);
          background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
          display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px;
        }
        .toolbar-date-summary { flex: 1; font-size: 13px; font-weight: 600; color: #fff; }
        .toolbar-date-summary span { font-size: 11px; font-weight: 400; color: rgba(255,255,255,.6); margin-right: 4px; }

        .btn-reload {
          flex-shrink: 0; width: 32px; height: 32px; border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.15);
          color: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-reload.spinning svg { animation: spin .7s linear infinite; }
        .toolbar-chevron {
          flex-shrink: 0; width: 32px; height: 32px; border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.15);
          color: #fff; display: inline-flex; align-items: center; justify-content: center;
          transition: transform .25s ease;
        }
        .toolbar-chevron.open { transform: rotate(180deg); }

        .toolbar-panel { max-height: 0; overflow: hidden; transition: max-height .28s ease; padding: 0 4px; }
        .toolbar-panel.open { max-height: 200px; padding: 0 4px 4px; }
        .toolbar-fields { display: flex; align-items: center; gap: 6px; padding-top: 2px; }
        .toolbar-fields input[type="date"] {
          flex: 1; height: 28px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,.22);
          background: rgba(255,255,255,.12); color: #fff; font-size: 12px; color-scheme: dark; outline: none;
        }

        .toolbar-presets { display: flex; gap: 5px; flex-wrap: wrap; padding: 5px 0 4px; }
        .preset-pill {
          font-size: 11px; font-weight: 600; padding: 5px 14px; border-radius: 20px;
          border: 1px solid rgba(255,255,255,.25); background: rgba(255,255,255,.12); color: rgba(255,255,255,.85);
          cursor: pointer;
        }
        .preset-pill.active { background: rgba(255,255,255,.92); color: var(--brand); border-color: transparent; }

        /* ── STAT STRIP (Flex Wrap) ──────────────────────── */
        .stat-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; padding: 4px 2px; }
        .stat-chip {
          display: flex; flex-direction: column; background: var(--surface);
          border: 1px solid var(--border); border-radius: var(--radius-sm);
          padding: 6px 10px; flex: 1; min-width: 90px;
        }
        .stat-chip__label {
          font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
          color: var(--text-3); padding-bottom: 4px; border-bottom: 1px solid var(--border); margin-bottom: 5px;
        }
        .stat-chip__value { font-size: 13px; font-weight: 700; font-family: var(--mono); color: var(--text-1); }
        .stat-chip__value.inflow { color: var(--green); }
        .stat-chip__value.outflow { color: var(--red); }

        /* ── TABLE CARD ──────────────────────────────────── */
        .screen-body { padding: 4px 2px 10px; }
        .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
        th { padding: 10px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-2); text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        .type-badge {
            display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
        }
        .type-inflow { background: var(--brand-light); color: var(--brand); border: 1px solid rgba(16,185,129,.2); }
        .type-outflow { background: rgba(239,68,68,.08); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
        .dir-dot { width: 8px; height: 8px; border-radius: 50%; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes rowIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        tbody tr { animation: rowIn .18s ease both; }
    </style>
</head>
<body>

<div class="screen-topbar">
    <button class="btn-icon" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <h5 class="screen-title">Cash Flow Analysis</h5>
    <span class="topbar-badge" id="badge-count">—</span>
</div>

<div class="report-toolbar">
    <div class="toolbar-summary" id="toolbar-summary">
        <div class="toolbar-cal-icon">&#128181;</div>
        <div class="toolbar-date-summary">
            <span>From</span><span id="summary-from">—</span>
            &nbsp;&#8594;&nbsp;
            <span>To</span><span id="summary-to">—</span>
        </div>
        <button class="btn-reload" id="loadBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <div class="toolbar-chevron" id="toolbar-chevron">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
    </div>
    <div class="toolbar-panel" id="toolbar-panel">
        <div class="toolbar-presets">
            <button class="preset-pill" data-preset="today">Today</button>
            <button class="preset-pill" data-preset="week">This Week</button>
            <button class="preset-pill active" data-preset="mtd">Month to Date</button>
        </div>
        <div class="toolbar-fields">
            <input type="date" id="tx-from" />
            <input type="date" id="tx-to" />
        </div>
    </div>
</div>

<main class="screen-body">
    <div class="stat-strip" id="stat-strip"></div>
    <div class="table-card" id="reportContainer"></div>
</main>

<script>
    ;(function () {
        /* ── PALETTE ── */
        const PALETTES = [
            { bg: 'rgba(16,185,129,.09)',  color: '#10b981' },
            { bg: 'rgba(59,130,246,.09)',   color: '#3b82f6' },
            { bg: 'rgba(245,158,11,.09)',   color: '#f59e0b' }
        ];
        const colorMap = {};
        let colorIdx = 0;
        function palette(key) {
            if (!colorMap[key]) colorMap[key] = PALETTES[colorIdx++ % PALETTES.length];
            return colorMap[key];
        }

        function fmt(v) {
            const n = parseFloat(v || 0);
            return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getPresetDates(preset) {
            const now = new Date();
            let start = new Date();
            if (preset === 'week') {
                const day = now.getDay();
                start.setDate(now.getDate() - day + (day === 0 ? -6 : 1));
            } else if (preset === 'mtd') {
                start = new Date(now.getFullYear(), now.getMonth(), 1);
            }
            return { start: start.toISOString().slice(0,10), end: now.toISOString().slice(0,10) };
        }

        /* ── RENDERERS ── */
        function renderStats(rows) {
            let totalIn = 0, totalOut = 0;
            const dateMap = new Map();

            rows.forEach(r => {
                const val = parseFloat(r.badgeValues) || 0;
                if(r.flowType === 'Inflow') totalIn += val;
                else totalOut += val;

                // Group by badgeName (date) for the mini chips
                dateMap.set(r.badgeName, (dateMap.get(r.badgeName) || 0) + val);
            });

            // Top 3 active dates for the badge chips
            const topDates = [...dateMap.entries()]
                .sort((a,b) => b[1] - a[1])
                .slice(0, 3);

            const dateChips = topDates.map(([date, val]) => {
                const p = palette(date);
                return `
                    <div class="stat-chip" style="border-color:${p.color}33">
                        <span class="stat-chip__label" style="color:${p.color}">${date}</span>
                        <span class="stat-chip__value" style="font-size:11px">${fmt(val)}</span>
                    </div>`;
            }).join('');

            document.getElementById('stat-strip').innerHTML = `
                <div class="stat-chip">
                    <span class="stat-chip__label">Net Flow</span>
                    <span class="stat-chip__value" style="color:var(--text-1)">${fmt(totalIn - totalOut)}</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-chip__label">Inflows</span>
                    <span class="stat-chip__value inflow">+${fmt(totalIn)}</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-chip__label">Outflows</span>
                    <span class="stat-chip__value outflow">-${fmt(totalOut)}</span>
                </div>
                ${dateChips}`;

            document.getElementById('badge-count').textContent = `${rows.length} records`;
        }

        async function loadCashFlow() {
            const from = document.getElementById('tx-from').value;
            const to = document.getElementById('tx-to').value;
            const btn = document.getElementById('loadBtn');
            btn.classList.add('spinning');

            try {
                const raw = await nativeApi.call('getCashFlow', { fromDate: from, toDate: to });
                const rows = JSON.parse(raw || "[]");
                renderStats(rows);

                if (!rows.length) {
                    document.getElementById('reportContainer').innerHTML = '<div style="padding:50px;text-align:center;color:var(--text-3)">No transactions found.</div>';
                    return;
                }

                document.getElementById('reportContainer').innerHTML = `
                    <table>
                        <thead><tr><th>Date</th><th>Type</th><th style="text-align:right">Amount</th></tr></thead>
                        <tbody>
                            ${rows.map((r, i) => `
                                <tr style="animation-delay:${i * 15}ms">
                                    <td style="font-family:var(--mono);font-size:12px;font-weight:600">${r.date}</td>
                                    <td>
                                        <span class="type-badge type-${r.flowType.toLowerCase()}">
                                            <span class="dir-dot" style="background:currentColor"></span>${r.flowType}
                                        </span>
                                    </td>
                                    <td style="text-align:right;font-weight:700;font-family:var(--mono)">${fmt(r.amount)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            } catch (e) { console.error(e); } finally { btn.classList.remove('spinning'); }
        }

        /* ── INIT ── */
        function init_cash_flow(params = {}) {
            const mtd = getPresetDates('mtd');
            document.getElementById('tx-from').value = params.start || mtd.start;
            document.getElementById('tx-to').value = params.end || mtd.end;

            const updateSummary = () => {
                document.getElementById('summary-from').textContent = document.getElementById('tx-from').value;
                document.getElementById('summary-to').textContent = document.getElementById('tx-to').value;
            };
            updateSummary();

            document.getElementById('toolbar-summary').onclick = () => {
                const isOpen = document.getElementById('toolbar-panel').classList.toggle('open');
                document.getElementById('toolbar-chevron').classList.toggle('open', isOpen);
            };

            document.querySelectorAll('.preset-pill').forEach(pill => {
                pill.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.preset-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    const range = getPresetDates(pill.dataset.preset);
                    document.getElementById('tx-from').value = range.start;
                    document.getElementById('tx-to').value = range.end;
                    updateSummary();
                    loadCashFlow();
                };
            });

            document.getElementById('tx-from').onchange = () => { updateSummary(); document.querySelectorAll('.preset-pill').forEach(p => p.classList.remove('active')); };
            document.getElementById('tx-to').onchange = () => { updateSummary(); document.querySelectorAll('.preset-pill').forEach(p => p.classList.remove('active')); };

            document.getElementById('backBtn').onclick = () => history.back();
            document.getElementById('loadBtn').onclick = (e) => { e.stopPropagation(); loadCashFlow(); };

            loadCashFlow();
        }

        window.init_cash_flow = init_cash_flow;
        window.loadCashFlow = loadCashFlow;
        document.addEventListener('DOMContentLoaded', () => init_cash_flow());
    })();
</script>
</body>
</html>

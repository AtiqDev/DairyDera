<!-- File: templates/report_purchase_edit.html -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button id="backPurchaseForm" class="btn btn-outline-secondary btn-icon me-3"
            onclick="navigate()">
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <div class="ConsoleLog"></div>
    <h5 class="screen-title mb-0 flex-grow-1">Edit Purchase</h5>
</div>

<main class="screen-body">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Supplier</label>
                <div class="form-control-plaintext"><strong id="rpeSup">—</strong></div>
            </div>

            <div class="mb-3">
                <label for="item" class="form-label">Item</label>
                <input id="item" type="text" class="form-control"/>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label for="rate" class="form-label">rate</label>
                    <input id="rate" type="number" step="0.01" class="form-control"/>
                </div>
                <div class="col-md-4">
                    <label for="qty" class="form-label">quantity</label>
                    <input id="qty" type="number" step="0.01" class="form-control"/>
                </div>
                <div class="col-md-4">
                    <label for="amount" class="form-label">amount</label>
                    <input id="amount" type="number" step="0.01" class="form-control"/>
                </div>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select id="status" class="form-select"></select>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">notes</label>
                <textarea id="notes" class="form-control" rows="2"></textarea>
            </div>

            <div class="d-flex justify-content-end">
                <button id="saveReportPurchase" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>
</main>

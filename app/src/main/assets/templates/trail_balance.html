<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Trial Balance</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --brand:        #2563eb;
          --brand-dark:   #1d4ed8;
          --brand-light:  rgba(37,99,235,.08);
          --bg:           #f2f4f8;
          --surface:      #ffffff;
          --surface2:     #f7f8fa;
          --border:       #e2e6ed;
          --green:        #16a34a;
          --green-dim:    rgba(22,163,74,.10);
          --red:          #dc2626;
          --red-dim:      rgba(220,38,38,.10);
          --amber:        #d97706;
          --amber-dim:    rgba(217,119,6,.10);
          --purple:       #7c3aed;
          --purple-dim:   rgba(124,58,237,.08);
          --teal:         #0d9488;
          --teal-dim:     rgba(13,148,136,.08);
          --text-1:       #0f172a;
          --text-2:       #64748b;
          --text-3:       #94a3b8;
          --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          --mono:         'Courier New', Courier, monospace;
          --radius:       10px;
          --radius-sm:    6px;
          --topbar-h:     52px;
          --toolbar-h:    52px;
        }

        html, body {
          height: 100%;
          background: var(--bg);
          color: var(--text-1);
          font-family: var(--font);
          font-size: 14px;
          -webkit-tap-highlight-color: transparent;
          overscroll-behavior: none;
        }

        /* ── TOPBAR ──────────────────────────────────────── */
        .screen-topbar {
          position: sticky; top: 0; z-index: 200;
          display: flex; align-items: center; gap: 10px;
          height: var(--topbar-h);
          padding: 0 4px;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          box-shadow: 0 1px 4px rgba(0,0,0,.07);
        }
        .screen-title {
          flex: 1;
          font-size: 15px; font-weight: 600; color: var(--text-1);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn-icon {
          flex-shrink: 0;
          width: 34px; height: 34px;
          border-radius: var(--radius-sm);
          border: 1px solid var(--border);
          background: transparent; color: var(--text-2);
          cursor: pointer;
          display: inline-flex; align-items: center; justify-content: center;
          font-size: 16px;
        }
        .btn-icon:active { background: var(--brand-light); color: var(--brand); }
        .topbar-badge {
          flex-shrink: 0;
          font-size: 11px; font-family: var(--mono);
          padding: 3px 3px; border-radius: 20px;
          background: var(--brand-light); color: var(--brand);
          border: 1px solid rgba(37,99,235,.18);
          white-space: nowrap;
        }

        /* ── FILTER TOOLBAR ──────────────────────────────── */
        .report-toolbar {
          position: sticky; top: var(--topbar-h); z-index: 100;
          background: var(--brand);
          border-bottom: 1px solid var(--brand-dark);
          overflow: hidden;
        }

        /* Collapsed summary row */
        .toolbar-summary {
          display: flex; align-items: center; gap: 10px;
          padding: 2px 4px; cursor: pointer;
          user-select: none; -webkit-user-select: none;
        }
        .toolbar-summary:active { background: rgba(0,0,0,.1); }
        .toolbar-cal-icon {
          width: 28px; height: 28px; flex-shrink: 0;
          border-radius: var(--radius-sm);
          background: rgba(255,255,255,.15);
          border: 1px solid rgba(255,255,255,.2);
          display: flex; align-items: center; justify-content: center;
          color: #fff; font-size: 13px;
        }
        .toolbar-date-summary {
          flex: 1;
          font-size: 13px; font-weight: 600; color: #fff;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .toolbar-date-summary span {
          font-size: 11px; font-weight: 400;
          color: rgba(255,255,255,.6); margin-right: 4px;
        }
        .btn-reload {
          flex-shrink: 0;
          width: 32px; height: 32px;
          border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.28);
          background: rgba(255,255,255,.15);
          color: #fff;
          cursor: pointer;
          display: inline-flex; align-items: center; justify-content: center;
          transition: background .15s;
        }
        .btn-reload:active { background: rgba(255,255,255,.35); }
        .btn-reload.spinning svg { animation: spin .7s linear infinite; }

        /* No date filter needed for trial balance - hide expandable panel elements */
        .toolbar-chevron, .toolbar-panel-separator, .toolbar-panel {
          display: none;
        }

        /* ── SCREEN BODY ─────────────────────────────────── */
        .screen-body { padding: 4px 2px 10px; }

        /* ── STAT STRIP ──────────────────────────────────── */
        .stat-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .stat-chip {
          display: flex; flex-direction: column;
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius-sm); padding: 6px 10px;
          flex: 1; min-width: 80px;
        }
        .stat-chip__label {
          font-size: 9px; font-weight: 700; letter-spacing: .07em;
          text-transform: uppercase; color: var(--text-3);
          padding-bottom: 4px;
          border-bottom: 1px solid var(--border);
          margin-bottom: 5px;
        }
        .stat-chip__value {
          font-size: 13px; font-weight: 700;
          font-family: var(--mono); color: var(--text-1);
        }
        .stat-chip__value.positive { color: var(--green); }
        .stat-chip__value.negative { color: var(--red); }

        /* ── TABLE CARD ──────────────────────────────────── */
        .table-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          overflow: hidden;
        }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        thead { position: sticky; top: 0; z-index: 10; }
        thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
        th {
          padding: 10px 12px;
          font-size: 10px; font-weight: 700; letter-spacing: .08em;
          text-transform: uppercase; color: var(--text-2);
          white-space: nowrap; background: var(--surface2); text-align: left;
        }
        th.right { text-align: right; }

        tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:active { background: var(--brand-light); }
        td { padding: 9px 12px; vertical-align: middle; color: var(--text-1); }

        /* ── CELL HELPERS ────────────────────────────────── */
        .c-mono   { font-family: var(--mono); font-size: 12px; }
        .c-muted  { color: var(--text-2); }
        .c-bold   { font-weight: 600; }
        .c-right  { text-align: right; }
        .c-nowrap { white-space: nowrap; }

        /* Account type section headers */
        .section-header {
          background: var(--surface2) !important;
          border-top: 2px solid var(--border);
          font-weight: 700;
          color: var(--text-1);
        }
        .section-header td { padding-top: 12px; padding-bottom: 12px; }
        .section-total {
          background: var(--surface2) !important;
          border-bottom: 2px solid var(--border);
          font-weight: 700;
        }
        .section-total td { padding-top: 12px; padding-bottom: 12px; }

        /* Debit/Credit formatting */
        .debit-cell {
          text-align: right; font-family: var(--mono);
          font-size: 13px; font-weight: 600; white-space: nowrap;
          color: var(--green);
        }
        .credit-cell {
          text-align: right; font-family: var(--mono);
          font-size: 13px; font-weight: 600; white-space: nowrap;
          color: var(--purple);
        }
        .balance-cell {
          text-align: right; font-family: var(--mono);
          font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .balance-positive { color: var(--green); }
        .balance-negative { color: var(--red); }

        /* Account type badge */
        .account-type-badge {
          display: inline-flex; align-items: center; gap: 4px;
          font-size: 10px; font-weight: 700;
          padding: 2px 7px; border-radius: 4px; white-space: nowrap;
        }

        /* ── STATES ──────────────────────────────────────── */
        .state-box {
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          padding: 56px 20px; text-align: center; gap: 10px;
        }
        .state-box svg { opacity: .25; width: 40px; height: 40px; }
        .state-box p { font-size: 13px; color: var(--text-3); }
        .state-box p.err { color: var(--red); opacity: .85; }

        .spinner {
          width: 28px; height: 28px;
          border: 2.5px solid var(--border); border-top-color: var(--brand);
          border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes rowIn {
          from { opacity: 0; transform: translateY(4px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        tbody tr { animation: rowIn .18s ease both; }
    </style>
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────── -->
<div class="screen-topbar">
    <button class="btn-icon" id="backBtn" aria-label="Back">
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="screen-title">Trial Balance</h5>
    <span class="topbar-badge" id="badge-count">—</span>
</div>

<!-- ── FILTER TOOLBAR ─────────────────────────────────── -->
<div class="report-toolbar" id="report-toolbar">
    <!-- Static summary (no date filter for trial balance) -->
    <div class="toolbar-summary" id="toolbar-summary">
        <div class="toolbar-cal-icon">&#128197;</div>
        <div class="toolbar-date-summary">
            <span>All Transactions</span>
        </div>
        <button class="btn-reload" id="loadBtn" aria-label="Reload">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
        </button>
        <!-- No chevron for trial balance -->
    </div>
</div>

<!-- ── SCREEN BODY ────────────────────────────────────── -->
<main class="screen-body">
    <div class="stat-strip" id="stat-strip"></div>
    <div class="table-card" id="reportContainer">
        <div class="state-box">
            <div class="spinner"></div>
            <p>Loading…</p>
        </div>
    </div>
</main>

<script>
    ;(function () {

      /* ── Formatting ───────────────────────────────────── */
      function fmtCurrency(val) {
        const n = parseFloat(val);
        if (isNaN(n) || Math.abs(n) < 0.01) return '—';
        
        const absVal = Math.abs(n);
        const formatted = absVal.toLocaleString('en-US', { 
          minimumFractionDigits: 2, 
          maximumFractionDigits: 2 
        });
        
        return formatted;
      }
      
      function fmtCurrencyWithSign(val) {
        const n = parseFloat(val);
        if (isNaN(n)) return '—';
        
        const absVal = Math.abs(n);
        const formatted = absVal.toLocaleString('en-US', { 
          minimumFractionDigits: 2, 
          maximumFractionDigits: 2 
        });
        
        return n < 0 ? `(${formatted})` : formatted;
      }

      /* ── Colour palette (stable per key) ─────────────── */
      const PALETTES = [
        { bg: 'rgba(37,99,235,.09)',   color: '#2563eb' },
        { bg: 'rgba(22,163,74,.09)',   color: '#16a34a' },
        { bg: 'rgba(217,119,6,.09)',   color: '#d97706' },
        { bg: 'rgba(124,58,237,.09)',  color: '#7c3aed' },
        { bg: 'rgba(13,148,136,.09)',  color: '#0d9488' },
        { bg: 'rgba(220,38,38,.09)',   color: '#dc2626' },
        { bg: 'rgba(75,0,130,.09)',    color: '#4b0082' },
      ];
      const colorMap = {};
      let colorIdx = 0;
      function palette(key) {
        if (!colorMap[key]) colorMap[key] = PALETTES[colorIdx++ % PALETTES.length];
        return colorMap[key];
      }
      
      function accountTypeBadgeHtml(accountType) {
        const p = palette(accountType || '—');
        return `<span class="account-type-badge"
          style="background:${p.bg};color:${p.color};border:1px solid ${p.color}33">
          <span style="display:inline-block;width:5px;height:5px;border-radius:50%;
                       background:${p.color};flex-shrink:0"></span>
          ${accountType || '—'}
        </span>`;
      }

      /* ── States ───────────────────────────────────────── */
      function showLoading() {
        document.getElementById('stat-strip').innerHTML = '';
        document.getElementById('badge-count').textContent = '—';
        document.getElementById('reportContainer').innerHTML =
          `<div class="state-box"><div class="spinner"></div><p>Loading…</p></div>`;
      }
      function showEmpty() {
        document.getElementById('stat-strip').innerHTML = '';
        document.getElementById('badge-count').textContent = '0 accounts';
        document.getElementById('reportContainer').innerHTML = `
          <div class="state-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p>No account data found.</p>
          </div>`;
      }
      function showError(msg) {
        document.getElementById('stat-strip').innerHTML = '';
        document.getElementById('badge-count').textContent = 'Error';
        document.getElementById('reportContainer').innerHTML = `
          <div class="state-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <circle cx="12" cy="16" r=".6" fill="#dc2626"/>
            </svg>
            <p class="err">${msg}</p>
          </div>`;
      }

      /* ── Trial Balance Stats ──────────────────────────── */
      /*
        Calculate and display:
        1. Total Debits
        2. Total Credits
        3. Difference (should be 0 if balanced)
        4. Debits/Credits by account type
      */
      function renderStats(rows) {
        const count = rows.length;
        document.getElementById('badge-count').textContent =
          `${count} account${count !== 1 ? 's' : ''}`;

        // Calculate totals
        const totalDebits = rows.reduce((sum, row) => sum + (parseFloat(row.totalDebits) || 0), 0);
        const totalCredits = rows.reduce((sum, row) => sum + (parseFloat(row.totalCredits) || 0), 0);
        const difference = totalDebits - totalCredits;
        
        // Group by account type for debits and credits
        const accountTypeMap = new Map();
        rows.forEach(r => {
          const type = r.accountType || 'Other';
          if (!accountTypeMap.has(type)) {
            accountTypeMap.set(type, { debits: 0, credits: 0 });
          }
          const data = accountTypeMap.get(type);
          data.debits += parseFloat(r.totalDebits) || 0;
          data.credits += parseFloat(r.totalCredits) || 0;
        });

        // Create chips for each account type (net balance)
        const chips = [...accountTypeMap.entries()].map(([type, data]) => {
          const net = data.debits - data.credits;
          const pal = palette(type);
          const isPositive = net >= 0;
          return `
            <div class="stat-chip"
              style="border-color:${pal.color}44">
              <span class="stat-chip__label"
                style="color:${pal.color}99">${type}</span>
              <span class="stat-chip__value ${isPositive ? 'positive' : 'negative'}"
                style="color:${isPositive ? 'var(--green)' : 'var(--red)'};
                       filter:drop-shadow(0 0 4px ${isPositive ? 'rgba(22,163,74,.5)' : 'rgba(220,38,38,.5)'})">
                ${fmtCurrencyWithSign(net)}
              </span>
            </div>`;
        }).join('');

        document.getElementById('stat-strip').innerHTML = `
          <div class="stat-chip">
            <span class="stat-chip__label">Total Debits</span>
            <span class="stat-chip__value positive" style="color:var(--green)">
              ${fmtCurrency(totalDebits)}
            </span>
          </div>
          <div class="stat-chip">
            <span class="stat-chip__label">Total Credits</span>
            <span class="stat-chip__value" style="color:var(--purple)">
              ${fmtCurrency(totalCredits)}
            </span>
          </div>
          <div class="stat-chip">
            <span class="stat-chip__label">Difference</span>
            <span class="stat-chip__value ${Math.abs(difference) < 0.01 ? 'positive' : 'negative'}"
              style="color:${Math.abs(difference) < 0.01 ? 'var(--green)' : 'var(--red)'}">
              ${fmtCurrencyWithSign(difference)} ${Math.abs(difference) < 0.01 ? '✓' : '✗'}
            </span>
          </div>
          ${chips}`;
      }

      /* ── Render table ─────────────────────────────────── */
      /*
        Columns: id, code, name, accountType, totalDebits, totalCredits
        Group by accountType with section headers and totals
      */
      function renderTable(rows) {
        if (!rows.length) { showEmpty(); return; }
        renderStats(rows);

        // Group rows by accountType
        const grouped = {};
        rows.forEach(row => {
          const type = row.accountType || 'Other';
          if (!grouped[type]) grouped[type] = [];
          grouped[type].push(row);
        });

        // Calculate section totals
        const sectionTotals = {};
        Object.keys(grouped).forEach(type => {
          sectionTotals[type] = grouped[type].reduce((acc, row) => {
            acc.debits += parseFloat(row.totalDebits) || 0;
            acc.credits += parseFloat(row.totalCredits) || 0;
            acc.net = acc.debits - acc.credits;
            return acc;
          }, { debits: 0, credits: 0, net: 0 });
        });

        // Define order for display
        const displayOrder = ['Asset', 'Liability', 'Equity', 'Revenue', 'Expense', 'Other'];
        
        let bodyHtml = '';
        let grandTotalDebits = 0;
        let grandTotalCredits = 0;

        displayOrder.forEach(type => {
          const sectionRows = grouped[type];
          if (!sectionRows || sectionRows.length === 0) return;

          // Section header
          const sectionTotal = sectionTotals[type] || { debits: 0, credits: 0, net: 0 };
          bodyHtml += `
            <tr class="section-header">
              <td colspan="3">${type.toUpperCase()}</td>
              <td class="debit-cell">${fmtCurrency(sectionTotal.debits)}</td>
              <td class="credit-cell">${fmtCurrency(sectionTotal.credits)}</td>
              <td class="balance-cell ${sectionTotal.net >= 0 ? 'balance-positive' : 'balance-negative'}">
                ${fmtCurrencyWithSign(sectionTotal.net)}
              </td>
            </tr>`;

          // Individual accounts
          sectionRows.forEach((row, i) => {
            const delay = Math.min(i * 12, 380);
            const debit = parseFloat(row.totalDebits) || 0;
            const credit = parseFloat(row.totalCredits) || 0;
            const net = debit - credit;
            
            bodyHtml += `
              <tr style="animation-delay:${delay}ms">
                <td class="c-mono c-muted" style="font-size:11px;">${row.code || '—'}</td>
                <td>${row.name || '—'}</td>
                <td>${accountTypeBadgeHtml(row.accountType)}</td>
                <td class="debit-cell">${debit > 0 ? fmtCurrency(debit) : '—'}</td>
                <td class="credit-cell">${credit > 0 ? fmtCurrency(credit) : '—'}</td>
                <td class="balance-cell ${net >= 0 ? 'balance-positive' : 'balance-negative'}">
                  ${fmtCurrencyWithSign(net)}
                </td>
              </tr>`;
          });

          // Section total
          bodyHtml += `
            <tr class="section-total">
              <td colspan="3" style="text-align:right; font-weight:700;">Total ${type}</td>
              <td class="debit-cell" style="font-weight:700;">${fmtCurrency(sectionTotal.debits)}</td>
              <td class="credit-cell" style="font-weight:700;">${fmtCurrency(sectionTotal.credits)}</td>
              <td class="balance-cell ${sectionTotal.net >= 0 ? 'balance-positive' : 'balance-negative'}" style="font-weight:700;">
                ${fmtCurrencyWithSign(sectionTotal.net)}
              </td>
            </tr>`;

          // Add to grand totals
          grandTotalDebits += sectionTotal.debits;
          grandTotalCredits += sectionTotal.credits;
        });

        // Grand totals row
        const grandDifference = grandTotalDebits - grandTotalCredits;
        bodyHtml += `
          <tr style="background:var(--surface2); border-top:2px solid var(--border);">
            <td colspan="3" style="text-align:right; font-weight:700; color:var(--text-1);">
              GRAND TOTALS
            </td>
            <td class="debit-cell" style="font-weight:700;">${fmtCurrency(grandTotalDebits)}</td>
            <td class="credit-cell" style="font-weight:700;">${fmtCurrency(grandTotalCredits)}</td>
            <td class="balance-cell ${Math.abs(grandDifference) < 0.01 ? 'balance-positive' : 'balance-negative'}" style="font-weight:700;">
              ${fmtCurrencyWithSign(grandDifference)} ${Math.abs(grandDifference) < 0.01 ? '✓' : '✗'}
            </td>
          </tr>`;

        document.getElementById('reportContainer').innerHTML = `
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Account Name</th>
                  <th>Type</th>
                  <th class="right">Debit</th>
                  <th class="right">Credit</th>
                  <th class="right">Net Balance</th>
                </tr>
              </thead>
              <tbody>${bodyHtml}</tbody>
            </table>
          </div>`;
      }

      /* ── Load ─────────────────────────────────────────── */
      async function loadTrialBalance() {
        const reloadBtn = document.getElementById('loadBtn');
        if (reloadBtn) reloadBtn.classList.add('spinning');
        showLoading();
        try {
          const raw    = await nativeApi.call('getTrialBalance');
          const parsed = raw ? JSON.parse(raw) : [];
          const rows   = Array.isArray(parsed) ? parsed : [];
          renderTable(rows);
        } catch (err) {
          console.error('Trial balance error:', err);
          showError('Failed to load trial balance.');
        } finally {
          if (reloadBtn) reloadBtn.classList.remove('spinning');
        }
      }

      /* ── Init ─────────────────────────────────────────── */
      function init_trail_balance() {
        document.getElementById('backBtn').addEventListener('click', () => history.back());

        // Remove click handler for toolbar-summary since there's no expandable panel
        document.getElementById('toolbar-summary').removeAttribute('onclick');
        
        document.getElementById('loadBtn').addEventListener('click', (e) => {
          e.stopPropagation();
          loadTrialBalance();
        });

        // Load initial data
        loadTrialBalance();
      }

      document.addEventListener('DOMContentLoaded', () => init_trail_balance());
      
      // Expose functions to window as requested
      window.init_trail_balance = init_trail_balance;

    })();
</script>
</body>
</html>

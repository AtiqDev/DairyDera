<div class="stub-topbar accent-daily">
    <button class="stub-back" onclick="navigate('dashboard')"><i class="fas fa-arrow-left"></i></button>
    <div class="stub-title">Daily Operations</div>
    <div class="ConsoleLog"></div>
</div>

<div class="stub-body">

    <!-- Stock summary -->
    <div class="stub-stock-card">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th style="text-align:right;">Qty</th>
                    <th>Unit</th>
                </tr>
            </thead>
            <tbody id="stockTableBody">
                <tr><td colspan="3" style="text-align:center;color:#90A4AE;padding:14px;">Loading…</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Daily Work Flow:
         1. Purchase  - consumable feed or raw milk (via Suppliers -> Purchase)
         2. Consume   - feed by cows
         3. Produce Milk -> saveMilkProduction:
              stages monthly costs once per month (wages, rent, fuel, electricity)
              accrues today's daily share of each as Expense journal entries
              then capitalizes all into 1015 WIP during saveMix
         4. Mix Milk  -> saveMix: combines purchased + produced milk into sellable stock
         5. Sale Milk - creates Accounts Receivable entries
    -->

    <div class="stub-section-band accent-daily">Work</div>
    <div class="stub-grid">

        <div class="stub-tile accent-daily" onclick="navigate('suppliers')">
            <div class="stub-icon icon-purchase"><i class="fas fa-shopping-cart"></i></div>
            <div class="stub-label">Purchase</div>
        </div>

        <div class="stub-tile accent-daily" onclick="navigate('stock_consumption')">
            <div class="stub-icon icon-daily"><i class="fas fa-balance-scale"></i></div>
            <div class="stub-label">Consume</div>
        </div>

        <div class="stub-tile accent-daily" onclick="navigate('produce_milk')">
            <div class="stub-icon icon-daily"><i class="fas fa-cow"></i></div>
            <div class="stub-label">Produce Milk</div>
        </div>

        <div class="stub-tile accent-daily" onclick="navigate('mix_milk')">
            <div class="stub-icon icon-daily"><i class="fas fa-blender"></i></div>
            <div class="stub-label">Mix Milk</div>
        </div>

        <div class="stub-tile accent-daily" onclick="navigate('customers')">
            <div class="stub-icon icon-sales"><i class="fas fa-cash-register"></i></div>
            <div class="stub-label">Sale Milk</div>
        </div>

    </div>

    <!-- Close section -->
    <div class="stub-section-band accent-expense">Close</div>
    <div class="stub-grid">

        <div class="stub-tile accent-reports" onclick="navigate('pl_report')">
            <div class="stub-icon icon-reports"><i class="fas fa-exchange-alt"></i></div>
            <div class="stub-label">Close Day</div>
        </div>

        <div class="stub-tile accent-reports" onclick="navigate('journal_report')">
            <div class="stub-icon icon-reports"><i class="fas fa-book"></i></div>

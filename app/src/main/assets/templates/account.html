<!-- File: templates/account.html -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <div class="ConsoleLog"></div>
    <button
            type="button"
            class="btn btn-outline-secondary btn-sm btn-icon me-2"
            onclick="navigate('inventory_stub')"
            aria-label="Back"
            style="width: 32px; height: 32px; padding: 0;"
    >
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="screen-title mb-0 flex-grow-1">Chart of Accounts</h5>
</div>

<main class="screen-body">
    <!-- Manage Account Card -->
    <div class="card mb-4">
        <div class="card-header">Manage Account</div>
        <div class="card-body">
            <form id="account-form" class="mb-0">
                <input type="hidden" id="acct-id" />

                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label for="acct-code" class="form-label">code</label>
                        <input type="text" id="acct-code" class="form-control" placeholder="Account code" required />
                    </div>
                    <div class="col-12 col-md-4">
                        <label for="acct-name" class="form-label">name</label>
                        <input type="text" id="acct-name" class="form-control" placeholder="Account name" required />
                    </div>
                    <div class="col-12 col-md-4">
                        <label for="acct-type" class="form-label">Type</label>
                        <select id="acct-type" class="form-select" required></select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex gap-2 mt-4">
                    <!-- Add just clears the form -->
                    <button type="button" id="btnAdd" class="btn btn-success btn-icon" title="New">
                        <i class="fas fa-plus"></i>
                    </button>

                    <!-- Save handles both create & update -->
                    <button type="button" id="btnUpdate" class="btn btn-primary btn-icon" title="Save" disabled>
                        <i class="fas fa-save"></i>
                    </button>

                    <!-- Delete only when editing -->
                    <button type="button" id="btnDelete" class="btn btn-danger btn-icon" title="Delete" disabled>
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Existing Accounts Table Card -->
    <div class="card">
        <div class="card-header">Existing Accounts</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table id="accounts-table" class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>code</th>
                        <th>name</th>
                        <th>Type</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

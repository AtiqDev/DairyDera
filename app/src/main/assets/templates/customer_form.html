<!-- File: android_asset/templates/customer_form.html -->

    <!-- Top Bar-->
    <div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
        <button type="button" class="btn btn-outline-secondary btn-icon me-3"
                onclick="navigate()" style="width:32px;height:32px;padding:0;">
            <i class="fas fa-arrow-circle-left"></i>
        </button>
        <h5 id="custFormTitle" class="screen-title flex-grow-1 mb-0"></h5>
        <button type="button" class="btn btn-outline-secondary btn-icon"
                onclick="navigate()" style="width:32px;height:32px;padding:0;">
            <i class="fas fa-times"></i>
        </button>
        <div class="ConsoleLog"></div>
    </div>

    <!-- Scrollable Content -->
    <main class="screen-body">
        <div class="card mx-auto" style="max-width:600px;">
            <div class="card-body">
                <form id="customer-form" class="mb-0">

                    <!-- Basic Fields -->
                    <div class="mb-3">
                        <label for="name" class="form-label">name</label>
                        <input type="text" id="name" class="form-control" required />
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">address</label>
                        <input type="text" id="address" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">phone</label>
                        <input type="tel" id="phone" class="form-control" />
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="rate" class="form-label">rate</label>
                            <input type="number" id="rate" class="form-control" placeholder="240" />
                        </div>
                        <div class="col-md-6">
                            <label for="quantity" class="form-label">quantity</label>
                            <input type="number" id="quantity" class="form-control" step="0.1" placeholder="1.0" />
                        </div>
                    </div>

                    <div class="mb-3 mt-3">
                        <label for="class" class="form-label">Class</label>
                        <select id="class" class="form-select"></select>
                    </div>

                    <!-- ===================== -->
                    <!--  Location Management  -->
                    <!-- ===================== -->
                    <hr class="my-4" />
                    <h6 class="mb-2 d-flex justify-content-between align-items-center">
                        <span>Customer Location</span>
                        <button id="btnAddLocation" type="button" class="btn btn-sm btn-outline-primary" style="width:200px;">
                            <i class="fas fa-map-marker-alt me-1"></i> Capture Location
                        </button>
                    </h6>
                    <div id="locationContainer" class="mb-3 small text-muted">
                        <div class="text-center text-secondary">No locations found.</div>
                    </div>

                    <!-- ===================== -->
                    <!--   Photo Management    -->
                    <!-- ===================== -->
                    <hr class="my-4" />
                    <h6 class="mb-2 d-flex justify-content-between align-items-center">
                        <span>Customer Photos</span>
                        <button id="btnAddPhoto" type="button" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-camera me-1"></i> Capture Photo
                        </button>
                    </h6>
                    <div id="photoContainer" class="mb-3">
                        <div class="text-center text-secondary">No photos found.</div>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-2 mt-3">
                        <button type="button" id="saveCustForm" class="btn btn-primary">Save</button>
                        <button type="button" id="makeSaleFromCust" class="btn btn-success">Make Sale</button>
                    </div>

                </form>
            </div>
        </div>

        <hr class="my-4" />
        <h6 class="mb-3 fw-semibold">Customer Invoice</h6>

        <div id="custInvoiceSection" class="mb-3">
            <div class="bg-white border rounded p-2">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
                    <div class="d-flex align-items-center">
                        <label for="custInvoiceMonth" class="form-label mb-0 me-2 fw-semibold">Month:</label>
                        <select id="custInvoiceMonth" class="form-select form-select-sm" style="max-width:160px;"></select>
                    </div>
                    <button id="btnRefreshInvoice" type="button" class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-sync-alt me-1"></i> Refresh
                    </button>
                </div>

                <div id="custInvoiceContainer" class="small">
                    <h6 id="custInvTitle" class="text-center fw-bold mb-3">No invoice loaded</h6>
                    <div id="custInvDetails" class="mb-3"></div>
                    <div class="table-scroll-wrapper">
                        <table id="custInvTable" class="table table-sm table-bordered table-striped mb-2">
                            <thead id="custInvHead" class="table-light"></thead>
                            <tbody id="custInvBody"></tbody>
                        </table>
                    </div>
                    <div id="custInvPayment" class="signature-section"></div>
                </div>
            </div>
        </div>
    </main>
<!-- Spacer to prevent clipping on Android WebView -->
<div style="height:50px;"></div>

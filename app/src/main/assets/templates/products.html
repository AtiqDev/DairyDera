<!-- Top Bar -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button
            type="button"
            class="btn btn-outline-secondary btn-sm btn-icon me-2"
            aria-label="Back to Inventory"
            onclick="navigate()"
            style="width: 32px; height: 32px; padding: 0;"
    >
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <div class="screen-title" id="formTitle">Add Product</div>
</div>

<main class="screen-body">

    <!-- Manage Product Card -->
    <div class="card mb-4">
        <div class="card-header">
            <span id="formTitleCard">Add Product</span>
        </div>
        <div class="card-body">
            <form id="product-form" class="mb-0">
                <input type="hidden" id="prod-id">

                <div class="mb-3">
                    <label for="prod-name" class="form-label">name</label>
                    <input
                            type="text"
                            id="prod-name"
                            class="form-control"
                            placeholder="Product name"
                            required
                    />
                </div>

                <div class="mb-3">
                    <label for="prod-desc" class="form-label">Description</label>
                    <textarea
                            id="prod-desc"
                            class="form-control"
                            rows="2"
                            placeholder="Optional description"
                    ></textarea>
                </div>

                <div class="mb-3">
                    <label for="base-unit" class="form-label">Base Unit</label>
                    <select id="base-unit" class="form-select" required></select>
                </div>

                <div id="no-units-warning" class="text-danger mb-3" style="display:none;">
                    No units available. Please add a unit on the UOMs screen first.
                </div>

                <div class="d-flex gap-2">
                    <button
                            type="button"
                            id="btnProdNew"
                            class="btn btn-secondary btn-icon"
                            title="New Product"
                    >
                        <i class="fas fa-plus"></i>
                    </button>

                    <button
                            type="button"
                            id="btnProdSave"
                            class="btn btn-primary btn-icon"
                            title="Save Product"
                            disabled
                    >
                        <i class="fas fa-save"></i>
                    </button>

                    <button
                            type="button"
                            id="btnProdDelete"
                            class="btn btn-danger btn-icon"
                            title="Delete Product"
                            disabled
                    >
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Existing Products -->
    <div class="card">
        <div class="card-header">Existing Products</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table id="products-table" class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>name</th>
                        <th>Base Unit</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<!-- File: templates/account_types.html -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button
            type="button"
            class="btn btn-outline-secondary btn-sm btn-icon me-2"
            onclick="navigate('inventory_stub')"
            aria-label="Back"
            style="width: 32px; height: 32px; padding: 0;"
    >
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="screen-title mb-0 flex-grow-1">Account Types</h5>
</div>

<main class="screen-body">
    <!-- Manage Form -->
    <div class="card mb-4">
        <div class="card-header">Manage Type</div>
        <div class="card-body">
            <form id="type-form" class="mb-0">
                <input type="hidden" id="type-id" />
                <div class="mb-3">
                    <label for="type-name" class="form-label">name</label>
                    <input
                            type="text"
                            id="type-name"
                            class="form-control"
                            placeholder="Enter account type"
                            required
                    />
                </div>
                <div class="d-flex gap-2">
                    <button type="button" id="btnAdd" class="btn btn-success btn-icon" title="Add">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button type="button" id="btnUpdate" class="btn btn-warning btn-icon" title="Save" disabled>
                        <i class="fas fa-save"></i>
                    </button>
                    <button type="button" id="btnDelete" class="btn btn-danger btn-icon" title="Delete" disabled>
                        <i class="fas fa-trash"></i>
                    </button>
                    <button type="button" id="btnClear" class="btn btn-secondary btn-icon" title="Clear">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Types Table -->
    <div class="card">
        <div class="card-header">Existing Types</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table id="types-table" class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">name</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

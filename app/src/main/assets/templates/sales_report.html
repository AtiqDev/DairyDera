<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sale Report</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --brand:        #16a34a;
          --brand-dark:   #15803d;
          --brand-light:  rgba(22,163,74,.08);
          --bg:           #f2f4f8;
          --surface:      #ffffff;
          --surface2:     #f7f8fa;
          --border:       #e2e6ed;
          --green:        #16a34a;
          --green-dim:    rgba(22,163,74,.10);
          --red:          #dc2626;
          --red-dim:      rgba(220,38,38,.10);
          --amber:        #d97706;
          --amber-dim:    rgba(217,119,6,.10);
          --blue:         #2563eb;
          --blue-dim:     rgba(37,99,235,.08);
          --purple:       #7c3aed;
          --purple-dim:   rgba(124,58,237,.08);
          --teal:         #0d9488;
          --teal-dim:     rgba(13,148,136,.08);
          --text-1:       #0f172a;
          --text-2:       #64748b;
          --text-3:       #94a3b8;
          --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          --mono:         'Courier New', Courier, monospace;
          --radius:       10px;
          --radius-sm:    6px;
          --topbar-h:     52px;
        }

        html, body {
          height: 100%;
          background: var(--bg);
          color: var(--text-1);
          font-family: var(--font);
          font-size: 14px;
          -webkit-tap-highlight-color: transparent;
          overscroll-behavior: none;
        }

        /* ── TOPBAR ──────────────────────────────────────── */
        .screen-topbar {
          position: sticky; top: 0; z-index: 200;
          display: flex; align-items: center; gap: 10px;
          height: var(--topbar-h);
          padding: 0 4px;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          box-shadow: 0 1px 4px rgba(0,0,0,.07);
        }
        .screen-title {
          flex: 1;
          font-size: 15px; font-weight: 600; color: var(--text-1);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn-icon {
          flex-shrink: 0;
          width: 34px; height: 34px;
          border-radius: var(--radius-sm);
          border: 1px solid var(--border);
          background: transparent; color: var(--text-2);
          cursor: pointer;
          display: inline-flex; align-items: center; justify-content: center;
          font-size: 16px;
        }
        .btn-icon:active { background: var(--brand-light); color: var(--brand); }
        .topbar-badge {
          flex-shrink: 0;
          font-size: 11px; font-family: var(--mono);
          padding: 3px 3px; border-radius: 20px;
          background: var(--brand-light); color: var(--brand);
          border: 1px solid rgba(22,163,74,.25);
          white-space: nowrap;
        }

        /* ── FILTER TOOLBAR ──────────────────────────────── */
        .report-toolbar {
          position: sticky; top: var(--topbar-h); z-index: 100;
          background: var(--brand);
          border-bottom: 1px solid var(--brand-dark);
          overflow: hidden;
        }

        /* Collapsed summary row */
        .toolbar-summary {
          display: flex; align-items: center; gap: 10px;
          padding: 2px 4px; cursor: pointer;
          user-select: none; -webkit-user-select: none;
        }
        .toolbar-summary:active { background: rgba(0,0,0,.1); }
        .toolbar-cal-icon {
          width: 28px; height: 28px; flex-shrink: 0;
          border-radius: var(--radius-sm);
          background: rgba(255,255,255,.15);
          border: 1px solid rgba(255,255,255,.2);
          display: flex; align-items: center; justify-content: center;
          color: #fff; font-size: 13px;
        }
        .toolbar-date-summary {
          flex: 1;
          font-size: 13px; font-weight: 600; color: #fff;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .toolbar-date-summary span {
          font-size: 11px; font-weight: 400;
          color: rgba(255,255,255,.6); margin-right: 4px;
        }
        .btn-reload {
          flex-shrink: 0;
          width: 32px; height: 32px;
          border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.28);
          background: rgba(255,255,255,.15);
          color: #fff;
          cursor: pointer;
          display: inline-flex; align-items: center; justify-content: center;
          transition: background .15s;
        }
        .btn-reload:active { background: rgba(255,255,255,.35); }
        .btn-reload.spinning svg { animation: spin .7s linear infinite; }

        .toolbar-chevron {
          flex-shrink: 0;
          width: 32px; height: 32px;
          border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.28);
          background: rgba(255,255,255,.15);
          color: #fff;
          display: inline-flex; align-items: center; justify-content: center;
          cursor: pointer;
          transition: background .15s, transform .25s ease;
        }
        .toolbar-chevron:active { background: rgba(255,255,255,.35); }
        .toolbar-chevron.open { transform: rotate(180deg); }

        /* Separator */
        .toolbar-panel-separator {
          height: 0;
          border-top: 1px solid rgba(255,255,255,.15);
          margin: 0 14px;
          transition: opacity .25s;
          opacity: 0;
        }
        .toolbar-panel-separator.visible { opacity: 1; }

        /* Expandable panel */
        .toolbar-panel {
          max-height: 0;
          overflow: hidden;
          transition: max-height .28s ease, padding .28s ease;
          padding: 0 4px;
        }
        .toolbar-panel.open {
          max-height: 200px;
          padding: 0 4px 4px;
        }

        /* Preset pills */
        .toolbar-presets {
          display: flex; gap: 5px; flex-wrap: wrap;
          padding: 5px 0 4px;
        }
        .preset-pill {
          font-size: 11px; font-weight: 600;
          padding: 5px 14px; border-radius: 20px;
          border: 1px solid rgba(255,255,255,.25);
          background: rgba(255,255,255,.12);
          color: rgba(255,255,255,.85);
          cursor: pointer; white-space: nowrap;
          -webkit-tap-highlight-color: transparent;
        }
        .preset-pill:active  { background: rgba(255,255,255,.30); }
        .preset-pill.active  {
          background: rgba(255,255,255,.92);
          color: var(--brand);
          border-color: transparent;
          font-weight: 700;
        }

        /* Date fields */
        .toolbar-fields {
          display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
          padding-top: 2px;
        }
        .toolbar-fields label {
          font-size: 10px; font-weight: 600; letter-spacing: .04em;
          color: rgba(255,255,255,.6); white-space: nowrap; text-transform: uppercase;
        }
        .toolbar-fields input[type="date"] {
          flex: 1; min-width: 0;
          height: 28px; padding: 0 2px;
          border-radius: var(--radius-sm);
          border: 1px solid rgba(255,255,255,.22);
          background: rgba(255,255,255,.12);
          color: #fff; font-size: 12px; font-family: var(--font);
          outline: none; -webkit-appearance: none; color-scheme: dark;
        }
        .toolbar-fields input[type="date"]:focus {
          border-color: rgba(255,255,255,.55);
          background: rgba(255,255,255,.20);
        }
        .toolbar-sep { color: rgba(255,255,255,.35); font-size: 11px; flex-shrink: 0; }

        /* ── SCREEN BODY ─────────────────────────────────── */
        .screen-body { padding: 4px 2px 10px; }

        /* ── STAT STRIP ──────────────────────────────────── */
        .stat-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .stat-chip {
          display: flex; flex-direction: column;
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius-sm); padding: 6px 10px;
          flex: 1; min-width: 80px;
        }
        .stat-chip__label {
          font-size: 9px; font-weight: 700; letter-spacing: .07em;
          text-transform: uppercase; color: var(--text-3);
          padding-bottom: 4px;
          border-bottom: 1px solid var(--border);
          margin-bottom: 5px;
        }
        .stat-chip__value {
          font-size: 13px; font-weight: 700;
          font-family: var(--mono); color: var(--text-1);
        }
        .stat-chip__value.green {
          color: var(--green);
          filter: drop-shadow(0 0 4px rgba(22,163,74,.5));
        }

        /* ── TABLE CARD ──────────────────────────────────── */
        .table-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          overflow: hidden;
        }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        thead { position: sticky; top: 0; z-index: 10; }
        thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
        th {
          padding: 10px 12px;
          font-size: 10px; font-weight: 700; letter-spacing: .08em;
          text-transform: uppercase; color: var(--text-2);
          white-space: nowrap; background: var(--surface2); text-align: left;
        }
        th.right { text-align: right; }

        tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:active { background: var(--brand-light); }
        td { padding: 9px 12px; vertical-align: middle; color: var(--text-1); }

        /* ── CELL HELPERS ────────────────────────────────── */
        .c-mono   { font-family: var(--mono); font-size: 12px; }
        .c-bold   { font-weight: 600; }
        .c-right  { text-align: right; }
        .c-nowrap { white-space: nowrap; }
        .c-green  { color: var(--green); font-weight: 600; }
        .c-muted  { color: var(--text-2); }

        .amount-cell {
          text-align: right;
          font-family: var(--mono); font-size: 13px;
          font-weight: 700; color: var(--green);
          white-space: nowrap;
        }
        .qty-cell {
          text-align: right;
          font-family: var(--mono); font-size: 13px;
          font-weight: 600; color: var(--text-1);
          white-space: nowrap;
        }

        /* ── TOTAL FOOTER ────────────────────────────────── */
        tfoot tr { background: var(--surface2); border-top: 2px solid var(--border); }
        tfoot td { padding: 10px 12px; font-weight: 700; font-size: 13px; }

        /* ── STATES ──────────────────────────────────────── */
        .state-box {
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          padding: 56px 20px; text-align: center; gap: 10px;
        }
        .state-box svg { opacity: .25; width: 40px; height: 40px; }
        .state-box p { font-size: 13px; color: var(--text-3); }
        .state-box p.err { color: var(--red); opacity: .85; }

        .spinner {
          width: 28px; height: 28px;
          border: 2.5px solid var(--border); border-top-color: var(--brand);
          border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes rowIn {
          from { opacity: 0; transform: translateY(4px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        tbody tr { animation: rowIn .18s ease both; }
    </style>
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────── -->
<div class="screen-topbar">
    <button class="btn-icon" id="backBtn" aria-label="Back">
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="screen-title">Sale Report</h5>
    <span class="topbar-badge" id="badge-count">—</span>
</div>

<!-- ── FILTER TOOLBAR ─────────────────────────────────── -->
<div class="report-toolbar" id="report-toolbar">

    <!-- Collapsed summary -->
    <div class="toolbar-summary" id="toolbar-summary">
        <div class="toolbar-cal-icon">&#128197;</div>
        <div class="toolbar-date-summary">
            <span>From</span><span id="summary-from">—</span>
            &nbsp;&#8594;&nbsp;
            <span>To</span><span id="summary-to">—</span>
        </div>
        <button class="btn-reload" id="loadBtn" aria-label="Reload">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
        </button>
        <div class="toolbar-chevron" id="toolbar-chevron">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </div>
    </div>

    <!-- Separator -->
    <div class="toolbar-panel-separator" id="toolbar-separator"></div>

    <!-- Expandable panel -->
    <div class="toolbar-panel" id="toolbar-panel">
        <div class="toolbar-presets">
            <button class="preset-pill" data-preset="today">Today</button>
            <button class="preset-pill" data-preset="week">This Week</button>
            <button class="preset-pill active" data-preset="mtd">Month to Date</button>
        </div>
        <div class="toolbar-fields">
            <label for="sl-from">From</label>
            <input type="date" id="sl-from" />
            <span class="toolbar-sep">&#8594;</span>
            <label for="sl-to">To</label>
            <input type="date" id="sl-to" />
        </div>
    </div>
</div>

<!-- ── SCREEN BODY ────────────────────────────────────── -->
<main class="screen-body">
    <div class="stat-strip" id="stat-strip"></div>
    <div class="table-card" id="reportContainer">
        <div class="state-box">
            <div class="spinner"></div>
            <p>Loading…</p>
        </div>
    </div>
</main>

<script>
    ;(function () {

      /* ── Date helpers ─────────────────────────────────── */
      function today()        { return new Date().toISOString().slice(0, 10); }
      function firstOfMonth() {
        const n = new Date();
        return new Date(n.getFullYear(), n.getMonth(), 1).toISOString().slice(0, 10);
      }
      function startOfWeek() {
        const d = new Date(); d.setDate(d.getDate() - d.getDay());
        return d.toISOString().slice(0, 10);
      }
      function fmtDisplayDate(iso) {
        if (!iso) return '—';
        const [y, m, d] = iso.split('-');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
      }

      /* ── Formatting ───────────────────────────────────── */
      function fmtAmount(val) {
        const n = parseFloat(val);
        return isNaN(n) ? '—'
          : n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function fmtQty(val) {
        const n = parseFloat(val);
        return isNaN(n) ? '—'
          : n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      /* "MM/DD/YYYY HH:MM" → "MM/DD/YYYY  h:MM AM/PM" */
      function fmtDateTime(raw) {
        if (!raw) return '—';
        const parts = raw.trim().split(' ');
        const datePart = parts[0] || '';
        const timePart = parts[1] || '';
        if (!timePart) return datePart;
        const [hStr, mStr] = timePart.split(':');
        let h = parseInt(hStr, 10);
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${datePart}  ${h}:${mStr || '00'} ${ampm}`;
      }

      /* ── Colour palette (stable per key) ─────────────── */
      const PALETTES = [
        { color: '#2563eb' }, { color: '#16a34a' }, { color: '#d97706' },
        { color: '#7c3aed' }, { color: '#0d9488' }, { color: '#dc2626' },
        { color: '#4b0082' },
      ];
      const colorMap = {};
      let colorIdx = 0;
      function palette(key) {
        if (!colorMap[key]) colorMap[key] = PALETTES[colorIdx++ % PALETTES.length];
        return colorMap[key];
      }

      /* ── States ───────────────────────────────────────── */
      function showLoading() {
        document.getElementById('stat-strip').innerHTML = '';
        document.getElementById('badge-count').textContent = '—';
        document.getElementById('reportContainer').innerHTML =
          `<div class="state-box"><div class="spinner"></div><p>Loading…</p></div>`;
      }
      function showEmpty() {
        document.getElementById('stat-strip').innerHTML = '';
        document.getElementById('badge-count').textContent = '0 records';
        document.getElementById('reportContainer').innerHTML = `
          <div class="state-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M6 2h12l4 4v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
              <polyline points="16 2 16 8 8 8"/><line x1="8" y1="13" x2="16" y2="13"/>
              <line x1="8" y1="17" x2="12" y2="17"/>
            </svg>
            <p>No sales found for this period.</p>
          </div>`;
      }
      function showError(msg) {
        document.getElementById('stat-strip').innerHTML = '';
        document.getElementById('badge-count').textContent = 'Error';
        document.getElementById('reportContainer').innerHTML = `
          <div class="state-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <circle cx="12" cy="16" r=".6" fill="#dc2626"/>
            </svg>
            <p class="err">${msg}</p>
          </div>`;
      }

      /* ── Generic stat badges ──────────────────────────── */
      /*
        Groups rows by customer name, sums saleAmount per customer.
        Uses the same case-insensitive key lookup pattern for portability.
      */
      function renderStats(rows) {
        const count = rows.length;
        document.getElementById('badge-count').textContent =
          `${count} sale${count !== 1 ? 's' : ''}`;

        if (!rows.length) {
          document.getElementById('stat-strip').innerHTML = '';
          return;
        }

        /* Group by customer → sum saleAmount */
        const badgeMap = new Map();
        rows.forEach(r => {
          const name = r._customerName || '—';
          const val  = (parseFloat(r.quantity) || 0) * (parseFloat(r.rate) || 0);
          badgeMap.set(name, (badgeMap.get(name) || 0) + val);
        });

        const grandTotal = [...badgeMap.values()].reduce((s, v) => s + v, 0);

        const chips = [...badgeMap.entries()].map(([name, total]) => {
          const pal = palette(name);
          return `
            <div class="stat-chip" style="border-color:${pal.color}44">
              <span class="stat-chip__label"
                style="color:${pal.color}99">${name}</span>
              <span class="stat-chip__value"
                style="color:${pal.color};filter:drop-shadow(0 0 4px ${pal.color}66)">
                ${fmtAmount(total)}
              </span>
            </div>`;
        }).join('');

        document.getElementById('stat-strip').innerHTML = `
          <div class="stat-chip">
            <span class="stat-chip__label">Total Sales</span>
            <span class="stat-chip__value green">${fmtAmount(grandTotal)}</span>
          </div>
          ${chips}`;
      }

      /* ── Render table ─────────────────────────────────── */
      /*
        querySalesByDate returns: id, customerId, quantity, rate
        getCustomers returns:     id, name, ...
        We join them client-side exactly like the original script.
      */
      function renderTable(rows) {
        if (!rows.length) { showEmpty(); return; }
        renderStats(rows);

        const grandTotal = rows.reduce((s, r) =>
          s + (parseFloat(r.quantity) || 0) * (parseFloat(r.rate) || 0), 0);
        const totalQty = rows.reduce((s, r) =>
          s + (parseFloat(r.quantity) || 0), 0);

        const bodyHtml = rows.map((r, i) => {
          const saleAmount = (parseFloat(r.quantity) || 0) * (parseFloat(r.rate) || 0);
          const delay = Math.min(i * 12, 380);
          return `
            <tr style="animation-delay:${delay}ms" data-id="${r.id}">
              <td class="c-bold">${r._customerName ?? '—'}</td>
              <td class="qty-cell">${fmtQty(r.quantity)}</td>
              <td class="c-mono c-right c-nowrap" style="color:var(--text-2);font-size:12px">
                ${fmtAmount(r.rate)}
              </td>
              <td class="amount-cell">${fmtAmount(saleAmount)}</td>
            </tr>`;
        }).join('');

        document.getElementById('reportContainer').innerHTML = `
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Customer</th>
                  <th class="right">Qty</th>
                  <th class="right">Rate</th>
                  <th class="right">Amount</th>
                </tr>
              </thead>
              <tbody>${bodyHtml}</tbody>
              <tfoot>
                <tr>
                  <td style="text-align:right;color:var(--text-2);
                             font-size:11px;letter-spacing:.06em;text-transform:uppercase;">
                    Total
                  </td>
                  <td class="c-right c-mono" style="color:var(--text-1)">
                    ${fmtQty(totalQty)}
                  </td>
                  <td></td>
                  <td class="amount-cell">${fmtAmount(grandTotal)}</td>
                </tr>
              </tfoot>
            </table>
          </div>`;

        /* Row tap → navigate to sale edit, same as original */
        document.querySelectorAll('#reportContainer tr[data-id]').forEach(tr => {
          tr.addEventListener('click', () => {
            navigate('report_sale_edit', {
              id: tr.dataset.id,
              date: document.getElementById('sl-from').value
            });
          });
        });
      }

      /* ── Load ─────────────────────────────────────────── */
      /*
        Matches the original exactly:
          1. getCustomers  — fetch customer list once
          2. getSaleReport { start, end }  — fetch sales for range
          3. Join client-side via customerId → customer.id
      */
      async function loadSaleReport() {
        const fromDate = document.getElementById('sl-from').value;
        const toDate   = document.getElementById('sl-to').value;
        if (!fromDate || !toDate) return;

        const reloadBtn = document.getElementById('loadBtn');
        if (reloadBtn) reloadBtn.classList.add('spinning');
        showLoading();
        try {
          /* parallel fetch — customers rarely change, sales depend on date */
          const [customersRaw, salesRaw] = await Promise.all([
            nativeApi.call('getCustomers'),
            nativeApi.call('getSaleReport', { start: fromDate, end: toDate }),
          ]);

          const customers = JSON.parse(customersRaw);
          const sales     = Array.isArray(JSON.parse(salesRaw))
                              ? JSON.parse(salesRaw) : [];

          /* Attach resolved customer name as _customerName */
          sales.forEach(s => {
            const c = customers.find(c => c.id === s.customerId) || {};
            s._customerName = c.name || '—';
          });

          renderTable(sales);
        } catch (err) {
          console.error('Sale report error:', err);
          showError('Failed to load sales.');
        } finally {
          if (reloadBtn) reloadBtn.classList.remove('spinning');
        }
      }

      /* ── Preset helpers ───────────────────────────────── */
      const PRESETS = {
        today: () => ({ from: today(),         to: today()  }),
        week:  () => ({ from: startOfWeek(),   to: today()  }),
        mtd:   () => ({ from: firstOfMonth(),  to: today()  }),
      };

      function applyPreset(key) {
        const range = PRESETS[key]?.();
        if (!range) return;
        document.getElementById('sl-from').value = range.from;
        document.getElementById('sl-to').value   = range.to;
        updateSummary();
        document.querySelectorAll('.preset-pill').forEach(p =>
          p.classList.toggle('active', p.dataset.preset === key));
      }

      /* ── Toolbar ──────────────────────────────────────── */
      function updateSummary() {
        document.getElementById('summary-from').textContent =
          fmtDisplayDate(document.getElementById('sl-from').value);
        document.getElementById('summary-to').textContent =
          fmtDisplayDate(document.getElementById('sl-to').value);
      }

      function setToolbarOpen(open) {
        document.getElementById('toolbar-panel').classList.toggle('open', open);
        document.getElementById('toolbar-chevron').classList.toggle('open', open);
        document.getElementById('toolbar-separator').classList.toggle('visible', open);
      }

      /* ── Init ─────────────────────────────────────────── */
      function init_sales_report(params = {}) {
        document.getElementById('sl-from').value = params.fromDate || firstOfMonth();
        document.getElementById('sl-to').value   = params.toDate   || today();
        updateSummary();

        document.getElementById('backBtn').addEventListener('click', () => history.back());

        document.getElementById('toolbar-summary').addEventListener('click', () => {
          const panel = document.getElementById('toolbar-panel');
          setToolbarOpen(!panel.classList.contains('open'));
        });

        document.getElementById('sl-from').addEventListener('change', () => {
          updateSummary();
          document.querySelectorAll('.preset-pill').forEach(p => p.classList.remove('active'));
        });
        document.getElementById('sl-to').addEventListener('change', () => {
          updateSummary();
          document.querySelectorAll('.preset-pill').forEach(p => p.classList.remove('active'));
        });

        document.querySelectorAll('.preset-pill').forEach(pill => {
          pill.addEventListener('click', e => {
            e.stopPropagation();
            applyPreset(pill.dataset.preset);
          });
        });

        document.getElementById('loadBtn').addEventListener('click', e => {
          e.stopPropagation();
          loadSaleReport();
        });

        setToolbarOpen(true);
        loadSaleReport();
      }

      document.addEventListener('DOMContentLoaded', () => init_sales_report());
      window.init_sales_report = init_sales_report;
      window.loadSaleReport   = loadSaleReport;

    })();
</script>
</body>
</html>

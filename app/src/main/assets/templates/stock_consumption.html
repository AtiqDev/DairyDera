<!-- Top Bar -->
<div class="screen-topbar bg-light border-bottom d-flex align-items-center px-3 py-2">
    <button
            type="button"
            class="btn btn-outline-secondary btn-sm btn-icon me-2"
            onclick="navigate()"
            aria-label="Back"
            style="width: 32px; height: 32px; padding: 0;"
    >
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="screen-title mb-0 flex-grow-1">Stock Consumption</h5>
</div>

<main class="screen-body">

    <!-- Current Stock -->
    <div class="card mb-4">
        <div class="card-header">Current Stock</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table id="stock-table" class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>quantity</th>
                        <th>Unit</th>
                        <th>Unit price</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Consume Stock -->
    <div class="card">
        <div class="card-header">Consume Stock</div>
        <div class="card-body">
            <form id="consumption-form" class="mb-0">
                <input type="hidden" id="selected-product-id">

                <div class="mb-3">
                    <label class="form-label">Product</label>
                    <div id="selected-product" class="fw-bold"></div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="quantity" class="form-label">quantity</label>
                        <input
                                type="number"
                                id="quantity"
                                class="form-control"
                                step="0.01"
                                min="0.01"
                                disabled
                                required
                        />
                    </div>
                    <div class="col-md-6">
                        <label for="unit-select" class="form-label">Unit</label>
                        <select id="unit-select" class="form-select" disabled required></select>
                    </div>
                </div>

                <div class="mb-3 mt-3">
                    <label for="notes" class="form-label">notes</label>
                    <textarea
                            id="notes"
                            class="form-control"
                            rows="2"
                            placeholder="Enter notes (e.g. reason for consumption)"
                    ></textarea>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="button"
                            id="btnStockClear"
                            class="btn btn-secondary btn-icon"
                            title="Clear">
                        <i class="fas fa-times"></i>
                    </button>
                    <button type="button"
                            id="btnStockConsume"
                            class="btn btn-primary btn-icon"
                            title="Consume"
                            disabled>
                        <i class="fas fa-check"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

</main>

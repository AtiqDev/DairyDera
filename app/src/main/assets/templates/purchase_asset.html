<!-- Top Bar -->
<div class="screen-topbar bg-light d-flex align-items-center">
    <button class="btn btn-outline-secondary btn-icon me-3"
            onclick="navigate()"
            aria-label="Back">
        <i class="fas fa-arrow-circle-left"></i>
    </button>
    <h5 class="mb-0">Purchase Milk Inventory</h5>
</div>

<main class="screen-body">
    <form id="purchase-form" novalidate>
        <!-- Supplier & Date -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label for="supplier-select" class="form-label">Supplier <span class="text-danger">*</span></label>
                <select id="supplier-select" class="form-select" required>
                    <option value="">Select supplier</option>
                </select>
                <div class="invalid-feedback">Please select a supplier.</div>
            </div>
            <div class="col-md-6">
                <label for="purchase-date" class="form-label">Date</label>
                <input type="date" id="purchase-date" class="form-control" required/>
                <div class="invalid-feedback">Enter a valid date.</div>
            </div>
        </div>

        <!-- Items Card Grid -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Milk Lines</span>
                <div>
                    Total: <span id="grand-total" class="fw-bold">0.00</span>
                </div>
            </div>
            <div class="card-body p-3">
                <div id="staticItemsGrid" class="mb-3">
                    <div id="staticItemsGridInner" class="d-flex flex-wrap gap-2"></div>
                </div>

                <button type="button" id="btnAddItem" class="btn btn-sm btn-outline-primary">
                    Add Line
                </button>
            </div>
        </div>

        <!-- Save Button -->
        <div class="text-end">
            <button type="submit" class="btn btn-primary" id="saveBtn" disabled>
                Save Purchase
            </button>
        </div>
    </form>
</main>

<!-- Popup: Add / Edit Item -->
<div id="addItemPopup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:18px; border-radius:12px; width:420px; box-shadow:0 4px 8px rgba(0,0,0,0.2);">
        <h6 id="popupTitle" class="mb-3 text-center">Add Milk Line</h6>

        <div class="mb-2">
            <label class="form-label">Product</label>
            <select id="popupProductSelect" class="form-select"></select>
        </div>

        <div class="row g-2 mb-2">
            <div class="col-6">
                <label class="form-label">quantity</label>
                <input type="number" id="popupQty" class="form-control" step="0.01" min="0.01" value="1" />
            </div>
            <div class="col-6">
                <label class="form-label">price/UOM</label>
                <input type="number" id="popupPrice" class="form-control" step="0.01" min="0" value="0" />
            </div>
        </div>

        <div class="mb-2">
            <label class="form-label">Unit</label>
            <select id="popupUomSelect" class="form-select"></select>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <button id="popupCancel" class="btn btn-secondary btn-sm">Cancel</button>
            <button id="popupSave" class="btn btn-success btn-sm">Save</button>
        </div>
    </div>
</div>

<style>
    #staticItemsGridInner > div {
        cursor: pointer; min-width:200px; max-width:320px; transition: transform .08s ease;
    }
    #staticItemsGridInner > div.selected {
        outline: 2px solid rgba(13,110,253,0.25); transform: translateY(-2px); box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
    }
    .remove-line {
        position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
        padding: 0; display: inline-flex; align-items: center; justify-content: center;
        border-radius: 6px; font-size: 14px;
    }
    .static-card { position: relative; padding-top: 8px; }
</style>
